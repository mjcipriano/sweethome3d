name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 7.5.1 or 7.5.1-beta.1
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.manual.outputs.release_created }}
      version: ${{ steps.release.outputs.version || steps.manual.outputs.version }}
      tag: ${{ steps.release.outputs.tag_name || steps.manual.outputs.tag }}
      prerelease: ${{ steps.manual.outputs.prerelease || 'false' }}
    steps:
      - name: Update release pull request or create release
        id: release
        if: github.event_name == 'push'
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve manual release
        id: manual
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch "^\d+\.\d+\.\d+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$") {
            throw "Version must be a semantic version such as 7.5.1 or 7.5.1-beta.1."
          }
          $prerelease = "${{ inputs.prerelease }}".ToLowerInvariant()
          if ($version.Contains("-") -and $prerelease -ne "true") {
            throw "A version with a prerelease suffix requires prerelease=true."
          }
          "release_created=true" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

  package:
    name: Package ${{ matrix.platform }}
    needs: prepare
    if: needs.prepare.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-15-intel
            platform: macos-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build tools
        shell: pwsh
        run: |
          if ($IsLinux) {
            sudo apt-get update
            sudo apt-get install -y ant
          } elseif ($IsMacOS) {
            brew install ant
          } else {
            choco install ant make --no-progress -y
          }

      - name: Build platform bundle
        shell: pwsh
        run: |
          make test-core
          ./scripts/package-release.ps1 -Version "${{ needs.prepare.outputs.version }}"

      - name: Verify release artifacts
        shell: pwsh
        run: ./scripts/verify-release.ps1 -Version "${{ needs.prepare.outputs.version }}" -ArtifactDirectory release

      - uses: actions/upload-artifact@v4
        with:
          name: SweetHome3D-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}
          path: |
            release/SweetHome3D-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.*
            release/SweetHome3D-${{ needs.prepare.outputs.version }}.jar
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Attach release artifacts
    needs:
      - prepare
      - package
    if: needs.prepare.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: SweetHome3D-*
          path: release
          merge-multiple: true

      - name: Validate merged executable JAR
        shell: pwsh
        run: |
          $jars = @(Get-ChildItem release -Filter "SweetHome3D-${{ needs.prepare.outputs.version }}.jar")
          if ($jars.Count -ne 1) {
            throw "Expected one merged executable JAR, found $($jars.Count)."
          }

      - name: Create checksums
        shell: bash
        run: |
          cd release
          sha256sum SweetHome3D-* > SHA256SUMS.txt

      - name: Create manual release when needed
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${{ needs.prepare.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            release_args=(
              "${{ needs.prepare.outputs.tag }}"
              --repo "${{ github.repository }}"
              --target "${{ github.sha }}"
              --title "Sweet Home 3D ${{ needs.prepare.outputs.version }}"
              --generate-notes
            )
            if [[ "${{ needs.prepare.outputs.prerelease }}" == "true" ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" release/* \
            --repo "${{ github.repository }}" \
            --clobber
