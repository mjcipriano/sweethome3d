name: Release

on:
  # Automated release: release-please opens/updates a release PR from the
  # conventional commits on main, and merging that PR (another push to main)
  # creates the tag, GitHub release and platform build assets.
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 7.5.1 or 7.5.1-beta.1
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.manual.outputs.release_created }}
      version: ${{ steps.release.outputs.version || steps.manual.outputs.version }}
      tag: ${{ steps.release.outputs.tag_name || steps.manual.outputs.tag }}
      prerelease: ${{ steps.manual.outputs.prerelease || 'false' }}
    steps:
      - name: Update release pull request or create release
        id: release
        if: github.event_name == 'push'
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve manual release
        id: manual
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch "^\d+\.\d+\.\d+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$") {
            throw "Version must be a semantic version such as 7.5.1 or 7.5.1-beta.1."
          }
          $prerelease = "${{ inputs.prerelease }}".ToLowerInvariant()
          if ($version.Contains("-") -and $prerelease -ne "true") {
            throw "A version with a prerelease suffix requires prerelease=true."
          }
          "release_created=true" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

  package:
    name: Package ${{ matrix.platform }}
    needs: prepare
    if: needs.prepare.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-15-intel
            platform: macos-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build tools
        shell: pwsh
        run: |
          if ($IsLinux) {
            sudo apt-get update
            sudo apt-get install -y ant cmake g++
          } elseif ($IsMacOS) {
            brew install ant cmake
          } else {
            choco install ant make cmake --no-progress -y
          }

      - name: Build platform bundle
        shell: pwsh
        run: |
          make test-core
          ./scripts/package-release.ps1 -Version "${{ needs.prepare.outputs.version }}"

      - name: Verify release artifacts
        shell: pwsh
        run: ./scripts/verify-release.ps1 -Version "${{ needs.prepare.outputs.version }}" -ArtifactDirectory release

      - name: Build WebXR preview plugin
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          make webxr-plugin
          cp plugins/WebXRPreview.sh3p \
            "release/SweetHome3D-${{ needs.prepare.outputs.version }}-WebXRPreview.sh3p"

      - uses: actions/upload-artifact@v4
        with:
          name: SweetHome3D-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}
          path: |
            release/SweetHome3D-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.*
            release/SweetHome3D-${{ needs.prepare.outputs.version }}.jar
            release/SweetHome3D-${{ needs.prepare.outputs.version }}-WebXRPreview.sh3p
            release/native/**
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Attach release artifacts
    needs:
      - prepare
      - package
    if: needs.prepare.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Linux artifact (JAR + native libs)
        uses: actions/download-artifact@v4
        with:
          name: SweetHome3D-${{ needs.prepare.outputs.version }}-linux-x64
          path: release

      - name: Download Windows native libs
        uses: actions/download-artifact@v4
        with:
          name: SweetHome3D-${{ needs.prepare.outputs.version }}-windows-x64
          path: release-windows

      - name: Download macOS native libs
        uses: actions/download-artifact@v4
        with:
          name: SweetHome3D-${{ needs.prepare.outputs.version }}-macos-x64
          path: release-macos

      - name: Download platform archives
        uses: actions/download-artifact@v4
        with:
          pattern: SweetHome3D-${{ needs.prepare.outputs.version }}-*
          path: release-archives
          merge-multiple: true

      - name: Merge platform archives into release
        shell: bash
        run: |
          # Copy platform archives (not the JAR or native dirs) into release/
          find release-archives -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp {} release/ \;

      - name: Embed all platform model LOD libraries into universal JAR
        shell: bash
        run: |
          universal_jar="release/SweetHome3D-${{ needs.prepare.outputs.version }}.jar"
          # Merge native dirs from all platforms
          for plat in release-windows release-macos; do
            if [ -d "$plat/native" ]; then
              cp -r "$plat/native"/* release/native/ 2>/dev/null || true
              # If the dir structure is flat, adjust
              find "$plat" -path '*/native/*' -type f | while read -r f; do
                rel="${f#$plat/}"
                mkdir -p "release/$(dirname "$rel")"
                cp "$f" "release/$rel"
              done
            fi
          done
          # Embed native dir into JAR
          jar uf "$universal_jar" -C release native
          # Verify all three platform LOD libs are present
          entries="$(jar tf "$universal_jar")"
          for native_entry in \
            native/linux/x64/libsweethome3d_model_lod.so \
            native/windows/x64/sweethome3d_model_lod.dll \
            native/macos/x64/libsweethome3d_model_lod.dylib; do
            grep -qx "$native_entry" <<<"$entries" || {
              echo "Universal JAR is missing $native_entry" >&2
              exit 1
            }
          done

      - name: Create checksums
        shell: bash
        run: |
          cd release
          sha256sum SweetHome3D-* > SHA256SUMS.txt

      - name: Create manual release when needed
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${{ needs.prepare.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            release_args=(
              "${{ needs.prepare.outputs.tag }}"
              --repo "${{ github.repository }}"
              --target "${{ github.sha }}"
              --title "Sweet Home 3D ${{ needs.prepare.outputs.version }}"
              --generate-notes
            )
            if [[ "${{ needs.prepare.outputs.prerelease }}" == "true" ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t release_assets < <(find release -maxdepth 1 -type f)
          gh release upload "${{ needs.prepare.outputs.tag }}" "${release_assets[@]}" \
            --repo "${{ github.repository }}" \
            --clobber
