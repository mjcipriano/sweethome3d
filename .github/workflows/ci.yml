name: CI

on:
  push:
    branches:
      - main
      - "chore/**"
      - "ci/**"
      - "feat/**"
      - "fix/**"
      - "perf/**"
    # Skip CI for documentation-only pushes. A push that also touches code
    # still runs because the filter only skips when every changed file matches.
    # version.txt is lowercase and intentionally not matched, so release and
    # version changes keep running CI.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Ant
        shell: pwsh
        run: |
          if ($IsLinux) {
            sudo apt-get update
            sudo apt-get install -y ant xvfb libgl1
          } elseif ($IsMacOS) {
            brew install ant
          } else {
            choco install ant make --no-progress -y
          }

      - name: Run core tests
        shell: pwsh
        run: |
          if ($IsLinux) {
            xvfb-run -a make test-core
          } else {
            make test-core
          }

      - name: Build executable JAR
        run: make jar

      - name: Check executable JAR contents
        shell: pwsh
        run: |
          $version = (Get-Content version.txt -Raw).Trim()
          New-Item release -ItemType Directory -Force | Out-Null
          Copy-Item "install/SweetHome3D-$version.jar" release/
          & ./scripts/verify-release.ps1 -Version $version -ArtifactDirectory release -SkipArchiveCheck

  gui-tests:
    name: GUI tests without Java 3D
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install graphics test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ant xvfb libgl1

      - name: Run Swing and controller tests
        run: xvfb-run -a make test-gui

  java3d-compatibility:
    name: Legacy Java 3D compatibility probe
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install graphics test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ant xvfb x11-utils mesa-utils libgl1 libgl1-mesa-dri

      - name: Run complete legacy Java 3D suite
        run: make test-local TEST_DISPLAY_MODE=xvfb

      - name: Upload native crash reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java3d-native-crash-reports
          path: hs_err_pid*.log
          if-no-files-found: ignore
